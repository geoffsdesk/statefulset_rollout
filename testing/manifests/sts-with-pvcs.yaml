apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-sts-pvc
  namespace: default
  labels:
    app: test-sts-pvc
    test-variant: pvc-warning-test
spec:
  replicas: 5
  podManagementPolicy: Parallel
  serviceName: test-sts-pvc
  selector:
    matchLabels:
      app: test-sts-pvc
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  template:
    metadata:
      labels:
        app: test-sts-pvc
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: nginx
        image: nginx:1.27.0
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 3
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-sts-pvc
  namespace: default
spec:
  clusterIP: None
  selector:
    app: test-sts-pvc
  ports:
  - port: 80
    targetPort: 80
