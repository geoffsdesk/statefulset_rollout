apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-restricted-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-readonly
  namespace: default
rules:
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-readonly-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: test-restricted-sa
  namespace: default
roleRef:
  kind: Role
  name: test-readonly
  apiGroup: rbac.authorization.k8s.io
