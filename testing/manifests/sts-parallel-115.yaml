apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-sts
  namespace: default
  labels:
    app: test-sts
    test-variant: parallel-good
spec:
  replicas: 115
  podManagementPolicy: Parallel
  serviceName: test-sts
  selector:
    matchLabels:
      app: test-sts
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "20%"
  template:
    metadata:
      labels:
        app: test-sts
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: nginx
        image: nginx:1.27.0
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-sts
  namespace: default
spec:
  clusterIP: None
  selector:
    app: test-sts
  ports:
  - port: 80
    targetPort: 80
